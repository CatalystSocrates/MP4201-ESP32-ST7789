<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MP4201 Pro 工业级全参数控制台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; 
            --border: #334155; --accent: #3b82f6; --on: #10b981; --off: #ef4444; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; }

        /* 顶部导航 */
        .header { order: 1; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #161e31; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .header h2 { font-size: 1.1rem; margin: 0; color: var(--accent); }

        /* 信号强度图标样式 */
        .rssi-box { display: flex; align-items: flex-end; gap: 2px; height: 14px; margin-right: 10px; }
        .rssi-bar { width: 3px; background: #475569; border-radius: 1px; }
        .rssi-bar.active { background: var(--on); }

        #connBtn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #connBtn.connected { background: var(--on); }

        /* 布局控制 */
        .stats-grid { order: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .control-panel { order: 3; background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; flex-direction: column; gap: 20px; }
        .charts-grid { order: 4; display: grid; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 1024px) {
            .control-panel { order: 4; flex-direction: row; align-items: flex-end; justify-content: flex-start; gap: 25px; }
            .charts-grid { order: 3; grid-template-columns: repeat(3, 1fr); }
            .chart-box { height: 240px !important; }
        }

        .stat-card { background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-card small { font-size: 9px; color: #94a3b8; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .stat-card div { font-size: 1.1rem; font-weight: bold; font-family: 'JetBrains Mono', monospace; }
        .chart-box { background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid var(--border); height: 180px; }
        .chart-box h5 { margin: 0 0 8px 0; font-size: 12px; color: #cbd5e1; border-left: 4px solid var(--accent); padding-left: 8px; }
        .ctrl-group { display: flex; flex-direction: column; gap: 8px; min-width: 160px; }
        input, select { background: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; font-size: 16px; outline: none; width: 100%; }
        .btn { border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; font-size: 14px; }
        .btn-set { background: #6366f1; } .btn-on { background: var(--on); flex: 1; } .btn-off { background: var(--off); flex: 1; }
        #heartbeat { width: 8px; height: 8px; border-radius: 50%; background: #475569; margin-right: 8px; display: inline-block; }
        .pulse { background: var(--accent) !important; box-shadow: 0 0 8px var(--accent); }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<div id="overlay">
    <h2 style="color:var(--off)">⚠️ 通讯链路断开</h2>
    <button onclick="connectBLE()" class="btn" style="background:var(--accent); min-width:200px">重新连接</button>
</div>

<div class="header">
    <h2>MP4201 Pro 系统</h2>
    <div style="display:flex; align-items:center;">
        <!-- 信号强度图标 -->
        <div class="rssi-box" id="rssiIcon">
            <div class="rssi-bar" style="height:4px"></div>
            <div class="rssi-bar" style="height:7px"></div>
            <div class="rssi-bar" style="height:10px"></div>
            <div class="rssi-bar" style="height:14px"></div>
        </div>
        <span id="heartbeat"></span>
        <span id="statusLabel" style="font-size:12px; color:#94a3b8; margin-right:10px;">OFFLINE</span>
        <button onclick="connectBLE()" id="connBtn">连接</button>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-card"> <small>输入电压</small> <div style="color:#60a5fa" id="txt_vi">--.-- V</div> </div>
    <div class="stat-card"> <small>输入电流</small> <div style="color:#94a3b8" id="txt_ii">--.-- A</div> </div>
    <div class="stat-card"> <small>输出电压</small> <div style="color:#facc15" id="txt_vo">--.-- V</div> </div>
    <div class="stat-card"> <small>输出电流</small> <div style="color:#22d3ee" id="txt_io">--.-- A</div> </div>
    <div class="stat-card"> <small>输出功率</small> <div style="color:#f472b6" id="txt_po">--.-- W</div> </div>
    <div class="stat-card"> <small>效率</small> <div style="color:#4ade80" id="txt_ef">-- %</div> </div>
    <div class="stat-card"> <small>信号强度</small> <div style="color:#a855f7" id="txt_rssi">-- dBm</div> </div>
</div>

<div class="control-panel">
    <div class="ctrl-group">
        <label>目标电压设定 (V)</label>
        <div style="display:flex; gap:8px;"><input type="number" id="v_set" value="12.0" step="0.1"><button class="btn btn-set" onclick="sendSetVolt()">写入</button></div>
    </div>
    <div class="ctrl-group">
        <label>限流设定 (A)</label>
        <div style="display:flex; gap:8px;"><input type="number" id="i_set" value="2.0" step="0.1"><button class="btn btn-set" onclick="sendSetCurr()">写入</button></div>
    </div>
    <div class="ctrl-group"><label>模式 (自动同步)</label><select id="m_set" onchange="sendCmd(0x04, this.value)"><option value="0">PFM (FSS 开)</option><option value="1">PFM (FSS 关)</option><option value="2">FCCM (FSS 开)</option><option value="3">FCCM (FSS 关)</option></select></div>
    <div class="ctrl-group"><label>频率 (自动同步)</label><select id="f_set" onchange="sendCmd(0x05, this.value)"><option value="0">200kHz</option><option value="1">400kHz</option><option value="2">600kHz</option><option value="3">1.0MHz</option></select></div>
    <div style="display:flex; gap:10px; flex:1;"><button class="btn btn-on" onclick="sendCmd(0x03, 1)">开启输出</button><button class="btn btn-off" onclick="sendCmd(0x03, 0)">关闭输出</button></div>
</div>

<div class="charts-grid">
    <div class="chart-box"><h5>输入电压 (Vi)</h5><canvas id="c_vi"></canvas></div>
    <div class="chart-box"><h5>输入电流 (Ii)</h5><canvas id="c_ii"></canvas></div>
    <div class="chart-box"><h5>输入功率 (Pi)</h5><canvas id="c_pi"></canvas></div>
    <div class="chart-box"><h5>输出电压 (Vo)</h5><canvas id="c_vo"></canvas></div>
    <div class="chart-box"><h5>输出电流 (Io)</h5><canvas id="c_io"></canvas></div>
    <div class="chart-box"><h5>输出功率 (Po)</h5><canvas id="c_po"></canvas></div>
</div>

<script>
    let charWrite = null;
    const charts = {};
    const BUF_SIZE = 45;
    const ALPHA = 0.25; 
    let filtered = { vi:0, ii:0, vo:0, io:0 };
    let isFirst = true;

    function initCharts() {
        const config = [{id:'c_vi', col:'#60a5fa', m:1}, {id:'c_ii', col:'#94a3b8', m:0.1}, {id:'c_pi', col:'#fb923c', m:1},
                        {id:'c_vo', col:'#facc15', m:1}, {id:'c_io', col:'#22d3ee', m:0.1}, {id:'c_po', col:'#f472b6', m:1}];
        config.forEach(cfg => {
            if(charts[cfg.id]) charts[cfg.id].destroy();
            charts[cfg.id] = new Chart(document.getElementById(cfg.id), {
                type: 'line',
                data: { labels: Array(BUF_SIZE).fill(''), datasets: [{ data: [], borderColor: cfg.col, borderWidth: 2, tension: 0.4, pointRadius: 0 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { x:{display:false}, y:{beginAtZero:true, grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#64748b', font:{size:10}}, suggestedMax:cfg.m } },
                    plugins: { legend: { display: false } }
                }
            });
        });
    }

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'MP4201_PWR' }], optionalServices: [0xFF01] });
            device.addEventListener('gattserverdisconnected', () => { document.getElementById('overlay').style.display = 'flex'; });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(0xFF01);
            const charNotify = await service.getCharacteristic(0xFF02);
            await charNotify.startNotifications();
            charNotify.addEventListener('characteristicvaluechanged', (e) => handleTelemetry(e.target.value));
            charWrite = await service.getCharacteristic(0xFF03);
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('connBtn').innerText = "在线";
            document.getElementById('connBtn').classList.add('connected');
            initCharts();
        } catch (e) { console.log(e); }
    }

    function handleTelemetry(b) {
        const hb = document.getElementById('heartbeat');
        hb.classList.add('pulse'); setTimeout(() => hb.classList.remove('pulse'), 100);

        if (b.byteLength < 16) return;

        // 1. 解析常规数据
        const r_vo = ((b.getUint8(0) << 8) | b.getUint8(1)) / 100;
        const r_io = ((b.getUint8(2) << 8) | b.getUint8(3)) / 100;
        const r_vi = ((b.getUint8(4) << 8) | b.getUint8(5)) / 100;
        const r_ii = ((b.getUint8(6) << 8) | b.getUint8(7)) / 100;
        
        // --- 核心：解析 RSSI (第 16 字节) ---
        // getInt8 是为了处理负数
        const rssi = b.byteLength >= 17 ? b.getInt8(16) : -100;
        updateRSSI(rssi);

        if (isFirst) { filtered = { vi:r_vi, ii:r_ii, vo:r_vo, io:r_io }; isFirst = false; }
        else {
            const f = (raw, last, th) => raw < th ? 0 : (ALPHA * raw) + ((1 - ALPHA) * last);
            filtered.vo = f(r_vo, filtered.vo, 0.02); filtered.io = f(r_io, filtered.io, 0.005);
            filtered.vi = f(r_vi, filtered.vi, 0.02); filtered.ii = f(r_ii, filtered.ii, 0.005);
        }

        document.getElementById('txt_vo').innerText = r_vo.toFixed(2) + " V";
        document.getElementById('txt_io').innerText = r_io.toFixed(3) + " A";
        document.getElementById('txt_po').innerText = (r_vo * r_io).toFixed(2) + " W";
        document.getElementById('txt_vi').innerText = r_vi.toFixed(2) + " V";
        document.getElementById('txt_ii').innerText = r_ii.toFixed(3) + " A";
        document.getElementById('txt_ef').innerText = b.getUint8(8) + " %";
        document.getElementById('txt_rssi').innerText = rssi + " dBm";

        // 自动同步设定值
        const vInp = document.getElementById('v_set'), iInp = document.getElementById('i_set');
        if (document.activeElement !== vInp) vInp.value = (((b.getUint8(12) << 8) | b.getUint8(13)) / 100).toFixed(1);
        if (document.activeElement !== iInp) iInp.value = (((b.getUint8(14) << 8) | b.getUint8(15)) / 100).toFixed(1);
        
        const mSel = document.getElementById('m_set'), fSel = document.getElementById('f_set');
        if (document.activeElement !== mSel) mSel.value = b.getUint8(10);
        if (document.activeElement !== fSel) fSel.value = b.getUint8(11);

        updatePlot('c_vi', filtered.vi); updatePlot('c_ii', filtered.ii); updatePlot('c_pi', r_vi * r_ii);
        updatePlot('c_vo', filtered.vo); updatePlot('c_io', filtered.io); updatePlot('c_po', r_vo * r_io);
    }

    // 信号强度图标更新函数
    function updateRSSI(val) {
        const bars = document.getElementById('rssiIcon').children;
        let activeBars = 0;
        if (val > -55) activeBars = 4;
        else if (val > -70) activeBars = 3;
        else if (val > -85) activeBars = 2;
        else if (val > -95) activeBars = 1;

        for (let i = 0; i < 4; i++) {
            bars[i].classList.toggle('active', i < activeBars);
        }
    }

    function updatePlot(id, val) {
        const c = charts[id]; if (!c) return;
        c.data.datasets[0].data.push(val);
        if (c.data.datasets[0].data.length > BUF_SIZE) c.data.datasets[0].data.shift();
        c.update('none');
    }

    async function sendCmd(cmd, val) {
        if (!charWrite) return;
        try { await charWrite.writeValue(new Uint8Array([cmd, (val >> 8) & 0xFF, val & 0xFF])); } catch(e) { }
    }
    function sendSetVolt() { sendCmd(0x01, Math.round(parseFloat(document.getElementById('v_set').value) * 10)); }
    function sendSetCurr() { sendCmd(0x02, Math.round(parseFloat(document.getElementById('i_set').value) * 10)); }
</script>
</body>
</html>
