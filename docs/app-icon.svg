<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Full background for maskable support -->
  <rect width="512" height="512" fill="#0F172A"/>
  
  <!-- Inner decorative frame (slightly smaller to stay in safe zone) -->
  <rect x="64" y="64" width="384" height="384" rx="40" fill="#1E293B" stroke="#334155" stroke-width="8"/>
  
  <!-- Circuit lines -->
  <path d="M120 180H80M120 256H60M120 332H80" stroke="#3B82F6" stroke-width="12" stroke-linecap="round"/>
  <path d="M392 180H432M392 256H452M392 332H432" stroke="#3B82F6" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Main Zap Symbol -->
  <path d="M280 160L180 280H260L230 380L330 260H250L280 160Z" fill="#FACC15" />
  
  <!-- Text Label -->
  <text x="256" y="440" text-anchor="middle" fill="#94A3B8" style="font-family: monospace; font-size: 32px; font-weight: bold; letter-spacing: 4px;">MP4201 PRO</text>
  
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
