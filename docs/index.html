<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MP4201 Pro 全参数监控工作站</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; 
            --border: #334155; --accent: #3b82f6; --on: #10b981; --off: #ef4444; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; overflow-x: hidden;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* 元素排序：手机端控制面板在图表上方，电脑端在下方 */
        .header { order: 1; }
        .stats-grid { order: 2; }
        .control-panel { order: 3; } 
        .charts-grid { order: 4; }

        @media (min-width: 1024px) {
            .control-panel { order: 4; }
            .charts-grid { order: 3; }
        }

        /* 状态头 */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: #161e31; border-radius: 12px; 
            margin-bottom: 20px; border: 1px solid var(--border); 
        }
        .header h2 { font-size: 1.3rem; margin: 0; color: var(--accent); letter-spacing: 1px; }

        #connBtn { 
            background: var(--accent); color: white; border: none; 
            padding: 10px 24px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        #connBtn.connected { background: var(--on); }

        /* 数值面板 */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; margin-bottom: 20px; 
        }
        .stat-card { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border); text-align: center; 
        }
        .stat-card small { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 6px; text-transform: uppercase; }
        .stat-card div { font-size: 1.3rem; font-weight: bold; font-family: 'JetBrains Mono', monospace; }

        /* 6图矩阵：电脑端强制 3x2 */
        .charts-grid { display: grid; gap: 20px; margin-bottom: 20px; }

        @media (min-width: 1024px) {
            .charts-grid { grid-template-columns: repeat(3, 1fr); }
            .chart-box { height: 260px !important; }
        }
        @media (min-width: 600px) and (max-width: 1023px) {
            .charts-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .chart-box { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border); height: 220px; 
        }
        .chart-box h5 { margin: 0 0 10px 0; font-size: 13px; color: #cbd5e1; border-left: 4px solid var(--accent); padding-left: 10px; }

        /* 控制面板 - 重点优化 */
        .control-panel { 
            background: #1e293b; padding: 25px; border-radius: 15px; 
            border: 1px solid var(--border); margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 20px;
        }

        @media (min-width: 1024px) {
            .control-panel { 
                flex-direction: row; 
                align-items: center; 
                justify-content: space-between; 
                gap: 20px;
            }
            .ctrl-main-group { display: flex; align-items: center; gap: 25px; flex-grow: 1; }
        }

        .ctrl-group { display: flex; flex-direction: column; gap: 8px; }
        .ctrl-group label { font-size: 12px; color: #94a3b8; font-weight: bold; white-space: nowrap; }

        .input-with-btn { display: flex; gap: 8px; align-items: center; }

        input, select { 
            background: #0f172a; border: 1px solid #475569; color: white; 
            padding: 10px; border-radius: 8px; font-size: 15px; outline: none;
            height: 42px;
        }
        input { width: 90px; text-align: center; }
        select { min-width: 150px; }
        input:focus { border-color: var(--accent); }

        .btn { 
            border: none; padding: 0 18px; border-radius: 8px; height: 42px;
            cursor: pointer; font-weight: bold; color: white; transition: 0.2s;
            white-space: nowrap; font-size: 14px;
        }
        .btn-set { background: #6366f1; }
        .btn-on { background: var(--on); min-width: 120px; }
        .btn-off { background: var(--off); min-width: 120px; }
        .btn:hover { filter: brightness(1.1); }
        .btn:active { transform: scale(0.96); }

        #heartbeat { width: 10px; height: 10px; border-radius: 50%; background: #475569; margin-right: 10px; display: inline-block; }
        .pulse { background: var(--accent) !important; box-shadow: 0 0 10px var(--accent); }

        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); z-index: 9999; flex-direction: column; 
            justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div id="overlay">
    <h2 style="color:var(--off)">⚠️ 通讯链路断开</h2>
    <p>电源已离线，请靠近设备并重连</p><br>
    <button onclick="connectBLE()" class="btn" style="background:var(--accent); min-width:220px; height: 50px;">重新连接设备</button>
</div>

<!-- 头部 -->
<div class="header">
    <h2>MP4201 PRO SYSTEM</h2>
    <div>
        <span id="heartbeat"></span>
        <span id="statusLabel" style="font-size:13px; color:#94a3b8; margin-right:15px;">DEVICE OFFLINE</span>
        <button onclick="connectBLE()" id="connBtn">📡 CONNECT</button>
    </div>
</div>

<!-- 数值面板 -->
<div class="stats-grid">
    <div class="stat-card"> <small>输入电压 (Vi)</small> <div style="color:#60a5fa" id="txt_vi">--.-- V</div> </div>
    <div class="stat-card"> <small>输入电流 (Ii)</small> <div style="color:#94a3b8" id="txt_ii">--.-- A</div> </div>
    <div class="stat-card"> <small>输入功率 (Pi)</small> <div style="color:#fb923c" id="txt_pi">--.-- W</div> </div>
    <div class="stat-card"> <small>输出电压 (Vo)</small> <div style="color:#facc15" id="txt_vo">--.-- V</div> </div>
    <div class="stat-card"> <small>输出电流 (Io)</small> <div style="color:#22d3ee" id="txt_io">--.-- A</div> </div>
    <div class="stat-card"> <small>输出功率 (Po)</small> <div style="color:#f472b6" id="txt_po">--.-- W</div> </div>
    <div class="stat-card"> <small>系统效率</small> <div style="color:#4ade80" id="txt_ef">-- %</div> </div>
</div>

<!-- 控制面板 -->
<div class="control-panel">
    <div class="ctrl-main-group">
        <div class="ctrl-group">
            <label>设定电压 (V)</label>
            <div class="input-with-btn">
                <input type="number" id="v_set" value="12.0" step="0.1">
                <button class="btn btn-set" onclick="sendSetVolt()">写入</button>
            </div>
        </div>

        <div class="ctrl-group">
            <label>限流设定 (A)</label>
            <div class="input-with-btn">
                <input type="number" id="i_set" value="2.0" step="0.1">
                <button class="btn btn-set" onclick="sendSetCurr()">写入</button>
            </div>
        </div>

        <div class="ctrl-group">
            <label>工作模式</label>
            <select id="m_set" onchange="sendCmd(0x04, this.value)">
                <option value="0">PFM (FSS 开)</option>
                <option value="1">PFM (FSS 关)</option>
                <option value="2">FCCM (FSS 开)</option>
                <option value="3">FCCM (FSS 关)</option>
            </select>
        </div>

        <div class="ctrl-group">
            <label>开关频率</label>
            <select id="f_set" onchange="sendCmd(0x05, this.value)">
                <option value="0">200kHz</option>
                <option value="1">400kHz</option>
                <option value="2">600kHz</option>
                <option value="3">1.0MHz</option>
            </select>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn btn-on" onclick="sendCmd(0x03, 1)">开启输出</button>
        <button class="btn btn-off" onclick="sendCmd(0x03, 0)">关闭输出</button>
    </div>
</div>

<!-- 6图阵列 -->
<div class="charts-grid">
    <div class="chart-box"><h5>输入电压 Vi (V)</h5><canvas id="c_vi"></canvas></div>
    <div class="chart-box"><h5>输入电流 Ii (A)</h5><canvas id="c_ii"></canvas></div>
    <div class="chart-box"><h5>输入功率 Pi (W)</h5><canvas id="c_pi"></canvas></div>
    <div class="chart-box"><h5>输出电压 Vo (V)</h5><canvas id="c_vo"></canvas></div>
    <div class="chart-box"><h5>输出电流 Io (A)</h5><canvas id="c_io"></canvas></div>
    <div class="chart-box"><h5>输出功率 Po (W)</h5><canvas id="c_po"></canvas></div>
</div>

<script>
    let charWrite = null;
    let bleDevice = null;
    const charts = {};
    const BUF_SIZE = 45;
    const ALPHA = 0.25; 
    let filtered = { vi:0, ii:0, vo:0, io:0 };
    let isFirst = true;

    function initCharts() {
        const config = [
            {id:'c_vi', col:'#60a5fa', m:1.0}, {id:'c_ii', col:'#94a3b8', m:0.1}, {id:'c_pi', col:'#fb923c', m:1.0},
            {id:'c_vo', col:'#facc15', m:1.0}, {id:'c_io', col:'#22d3ee', m:0.1}, {id:'c_po', col:'#f472b6', m:1.0}
        ];
        config.forEach(cfg => {
            if(charts[cfg.id]) charts[cfg.id].destroy();
            charts[cfg.id] = new Chart(document.getElementById(cfg.id), {
                type: 'line',
                data: { labels: Array(BUF_SIZE).fill(''), datasets: [{ data: [], borderColor: cfg.col, borderWidth: 2, tension: 0.4, pointRadius: 0 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { x:{display:false}, y:{beginAtZero:true, grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#64748b', font:{size:10}}, suggestedMax:cfg.m } },
                    plugins: { legend: { display: false } }
                }
            });
        });
    }

    async function connectBLE() {
        try {
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'MP4201_PWR' }],
                optionalServices: [0xFF01]
            });
            bleDevice.addEventListener('gattserverdisconnected', () => { 
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('connBtn').classList.remove('connected');
                document.getElementById('statusLabel').innerText = "DEVICE OFFLINE";
            });
            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(0xFF01);
            const charNotify = await service.getCharacteristic(0xFF02);
            await charNotify.startNotifications();
            charNotify.addEventListener('characteristicvaluechanged', handleTelemetry);
            charWrite = await service.getCharacteristic(0xFF03);
            
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('connBtn').innerText = "CONNECTED";
            document.getElementById('connBtn').classList.add('connected');
            document.getElementById('statusLabel').innerText = "SYNCING";
            initCharts();
        } catch (e) { console.log(e); }
    }

    function handleTelemetry(event) {
        const hb = document.getElementById('heartbeat');
        hb.classList.add('pulse');
        setTimeout(() => hb.classList.remove('pulse'), 100);

        const b = event.target.value;
        if (b.byteLength < 16) return;

        const r_vo = Math.max(0, ((b.getUint8(0) << 8) | b.getUint8(1)) / 100);
        const r_io = Math.max(0, ((b.getUint8(2) << 8) | b.getUint8(3)) / 100);
        const r_vi = Math.max(0, ((b.getUint8(4) << 8) | b.getUint8(5)) / 100);
        const r_ii = Math.max(0, ((b.getUint8(6) << 8) | b.getUint8(7)) / 100);
        const ef = b.getUint8(8);

        if (isFirst) {
            filtered = { vi:r_vi, ii:r_ii, vo:r_vo, io:r_io }; isFirst = false;
        } else {
            const f = (raw, last, th) => raw < th ? 0 : (ALPHA * raw) + ((1 - ALPHA) * last);
            filtered.vo = f(r_vo, filtered.vo, 0.02);
            filtered.io = f(r_io, filtered.io, 0.005);
            filtered.vi = f(r_vi, filtered.vi, 0.02);
            filtered.ii = f(r_ii, filtered.ii, 0.005);
        }

        document.getElementById('txt_vo').innerText = r_vo.toFixed(2) + " V";
        document.getElementById('txt_io').innerText = r_io.toFixed(3) + " A";
        document.getElementById('txt_po').innerText = (r_vo * r_io).toFixed(2) + " W";
        document.getElementById('txt_vi').innerText = r_vi.toFixed(2) + " V";
        document.getElementById('txt_ii').innerText = r_ii.toFixed(3) + " A";
        document.getElementById('txt_pi').innerText = (r_vi * r_ii).toFixed(2) + " W";
        document.getElementById('txt_ef').innerText = ef + " %";

        // 同步逻辑
        const remoteSetV = ((b.getUint8(12) << 8) | b.getUint8(13)) / 100;
        const remoteSetI = ((b.getUint8(14) << 8) | b.getUint8(15)) / 100;
        const m_idx = b.getUint8(10);
        const f_idx = b.getUint8(11);

        const vInp = document.getElementById('v_set'), iInp = document.getElementById('i_set');
        const mSel = document.getElementById('m_set'), fSel = document.getElementById('f_set');

        if (document.activeElement !== vInp) vInp.value = remoteSetV.toFixed(1);
        if (document.activeElement !== iInp) iInp.value = remoteSetI.toFixed(1);
        if (document.activeElement !== mSel) mSel.value = m_idx;
        if (document.activeElement !== fSel) fSel.value = f_idx;

        updatePlot('c_vi', filtered.vi); updatePlot('c_ii', filtered.ii); updatePlot('c_pi', filtered.vi * filtered.ii);
        updatePlot('c_vo', filtered.vo); updatePlot('c_io', filtered.io); updatePlot('c_po', filtered.vo * filtered.io);
    }

    function updatePlot(id, val) {
        const c = charts[id]; if (!c) return;
        c.data.datasets[0].data.push(val);
        if (c.data.datasets[0].data.length > BUF_SIZE) c.data.datasets[0].data.shift();
        c.update('none');
    }

    async function sendCmd(cmd, val) {
        if (!charWrite) return;
        try {
            await charWrite.writeValue(new Uint8Array([cmd, (val >> 8) & 0xFF, val & 0xFF]));
        } catch(e) { }
    }

    function sendSetVolt() { sendCmd(0x01, Math.round(parseFloat(document.getElementById('v_set').value) * 10)); }
    function sendSetCurr() { sendCmd(0x02, Math.round(parseFloat(document.getElementById('i_set').value) * 10)); }
</script>
</body>
</html>
